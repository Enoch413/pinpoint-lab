<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PINPOINT LAB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", "Noto Sans KR", "Segoe UI", sans-serif;
      color: #1d2c2f;
      background:
        radial-gradient(circle at top left, rgba(46, 123, 105, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(217, 187, 139, 0.24), transparent 24%),
        linear-gradient(180deg, #f7f2ea 0%, #efe7da 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.24;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.16'/%3E%3C/svg%3E");
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      z-index: 1;
    }
    .shell {
      width: min(980px, 100%);
      display: grid;
      gap: 18px;
    }
    .kicker {
      font-family: "Lexend", "Plus Jakarta Sans", sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #2e7b69;
    }
    .card {
      position: relative;
      padding: clamp(28px, 5vw, 46px);
      border-radius: 32px;
      border: 1px solid rgba(23, 79, 89, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 252, 247, 0.96)),
        radial-gradient(circle at top right, rgba(46, 123, 105, 0.08), transparent 26%);
      box-shadow: 0 28px 80px rgba(34, 41, 38, 0.12);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 24px;
      pointer-events: none;
    }
    .card-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 360px);
      gap: 20px;
      align-items: end;
    }
    .display {
      max-width: 12ch;
    }
    h1 {
      margin: 8px 0 14px;
      font-family: "Bebas Neue", "Lexend", sans-serif;
      font-size: clamp(4rem, 10vw, 7rem);
      line-height: 0.92;
      letter-spacing: 0.06em;
      color: #174f59;
    }
    .copy {
      max-width: 48ch;
      font-size: 15px;
      line-height: 1.8;
      color: #6e685e;
    }
    .panel {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(145deg, #194c56 0%, #276d60 58%, #3c8c72 100%);
      color: #f8f4ec;
      box-shadow: 0 20px 36px rgba(23, 79, 89, 0.22);
    }
    .panel-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(248, 244, 236, 0.72);
      margin-bottom: 10px;
    }
    .panel-title {
      font-family: "Lexend", "Plus Jakarta Sans", sans-serif;
      font-size: 1.45rem;
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .panel-copy {
      font-size: 13px;
      line-height: 1.72;
      color: rgba(248, 244, 236, 0.84);
      margin-bottom: 16px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, #f3e1c6 0%, #e7cc9d 100%);
      color: #5b4630;
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 12px 24px rgba(14, 26, 28, 0.16);
    }
    @media (max-width: 760px) {
      main { padding: 18px; }
      .card-grid { grid-template-columns: 1fr; }
      .display { max-width: none; }
      h1 { font-size: clamp(3.4rem, 20vw, 5rem); }
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <div class="kicker">PINPOINT WORKBENCH</div>
      <section class="card">
        <div class="card-grid">
          <div>
            <div class="display">
              <h1>PINPOINT LAB</h1>
            </div>
            <div class="copy">영어 지문 원문, 분석 MD, 출제포인트를 한 화면 안에서 정리하고 교사용·학생용 자료까지 빠르게 묶는 작업실입니다.</div>
          </div>
          <div class="panel">
            <div class="panel-label">Launch</div>
            <div class="panel-title">Open the editor and keep building.</div>
            <div class="panel-copy">정리된 카드형 레이아웃과 차분한 작업 화면으로 바로 들어가 지문 자료 생성을 이어갈 수 있습니다.</div>
            <a href="./app/index.html">앱 열기</a>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
